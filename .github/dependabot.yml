version: 2
updates:
  # NuGet dependencies (EF Core, NUnit, Swashbuckle, etc.)
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Group minor + patch bumps so the LTS patch train (10.0.x) arrives as one PR;
      # majors stay as separate PRs that need a human look.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions versions used in .github/workflows/
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
