name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore InsuranceIntegration.sln

      - name: Verify formatting
        run: dotnet format InsuranceIntegration.sln --verify-no-changes --severity warn --no-restore

      - name: Build
        run: dotnet build InsuranceIntegration.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test InsuranceIntegration.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=normal"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/test-results.trx'

  auto-merge:
    name: Auto-merge Dependabot minor & patch
    needs: build-test
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Squash-merge minor, patch & GitHub Actions updates
        # GitHub Actions bumps are validated by this same CI run, so they are
        # safe to auto-merge even on a major; npm/nuget majors stay manual.
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.package-ecosystem == 'github_actions'
        run: |
          gh pr merge --squash "$PR_URL" \
            || echo "::notice::Merge deferred; Dependabot will rebase and retry."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
